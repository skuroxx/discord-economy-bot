<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Portal</title>
    <style>
        :root {
            --bg-dark: #202225;
            --bg-card: #2f3136;
            --bg-input: #40444b;
            --text-main: #ffffff;
            --text-muted: #b9bbbe;
            --discord-blurple: #5865F2;
            --discord-blurple-hover: #4752C4;
            --danger-red: #ed4245;
            --success-green: #3ba55d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }

        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        p { color: var(--text-muted); font-size: 15px; margin-bottom: 30px; }

        .info-box {
            background-color: var(--bg-input);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 25px;
            text-align: left;
            border-left: 4px solid var(--success-green);
        }

        .info-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; font-weight: bold; }
        .info-value { font-size: 16px; word-break: break-all; }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.15s ease;
        }

        .btn-login { background-color: var(--discord-blurple); color: #ffffff; }
        .btn-login:hover { background-color: var(--discord-blurple-hover); }
        .btn-logout { background-color: transparent; color: #ffffff; border: 1px solid var(--danger-red); }
        .btn-logout:hover { background-color: var(--danger-red); }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--discord-blurple);
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card" id="portal-card">
        <h1>Loading...</h1>
    </div>

    <script>
        // CONFIGURATION: Change this to your live VPS address
        const VPS_URL = "http://0.0.0.0:80 (1)"; 

        const card = document.getElementById("portal-card");
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        // ROUTER SYSTEM INSIDE ONE FILE
        if (code) {
            // STATE 1: User just arrived from Discord with a code. Act as Callback.
            renderLoading("Verifying identity with backend...");
            
            fetch(`${VPS_URL}/api/callback`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code: code })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    localStorage.setItem("username", data.username);
                    localStorage.setItem("discord_id", data.discord_id);
                    // Clean the URL code parameters up and look clean
                    window.location.href = window.location.pathname; 
                } else {
                    renderError(data.error || "Authentication failed");
                }
            })
            .catch(() => renderError("Could not reach VPS backend server."));

        } else {
            // STATE 2: Normal routing (Show Login page or Logged In dashboard)
            const username = localStorage.getItem("username");
            const discordId = localStorage.getItem("discord_id");

            if (username) {
                renderDashboard(username, discordId);
            } else {
                renderLoginView();
            }
        }

        // VISUAL RENDERING FUNCTIONS
        function renderLoginView() {
            card.innerHTML = `
                <h1>Gateway Access</h1>
                <p>Authenticate your session using your official Discord account securely.</p>
                <button class="btn btn-login" onclick="handleLoginRequest()">Login with Discord</button>
            `;
        }

        function renderDashboard(username, id) {
            card.innerHTML = `
                <h1>Welcome Back</h1>
                <p>You have securely logged into the platform.</p>
                <div class="info-box">
                    <div class="info-label">Username</div>
                    <div class="info-value" style="font-weight:600;">${username}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Discord Snowflake ID</div>
                    <div class="info-value" style="font-family:monospace;">${id}</div>
                </div>
                <button class="btn btn-logout" onclick="handleLogout()">Sign Out</button>
            `;
        }

        function renderLoading(message) {
            card.innerHTML = `
                <div class="spinner"></div>
                <h1>Authenticating</h1>
                <p>${message}</p>
            `;
        }

        function renderError(message) {
            card.innerHTML = `
                <h1 style="color:var(--danger-red)">Error</h1>
                <p>${message}</p>
                <button class="btn btn-login" onclick="window.location.href=window.location.pathname">Try Again</button>
            `;
        }

        // INTERACTION HANDLERS
        function handleLoginRequest() {
            fetch(`${VPS_URL}/api/login-url`)
                .then(res => res.json())
                .then(data => window.location.href = data.url)
                .catch(() => alert("Error: VPS Offline or API Misconfigured."));
        }

        function handleLogout() {
            localStorage.clear();
            window.location.reload();
        }
    </script>

</body>
</html>
