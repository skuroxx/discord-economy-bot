<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C# Browser IDE & Compiler</title>
    <!-- Tailwind CSS for modern layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- RequireJS to load Monaco Editor seamlessly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body class="bg-[#0D0E12] text-gray-200 min-h-screen flex flex-col font-sans select-none">

    <!-- Top Status Control Panel -->
    <header class="border-b border-zinc-800 bg-[#16171D] px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="flex h-3 w-3 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-purple-600"></span>
            </span>
            <h1 class="text-xs font-mono tracking-[0.2em] text-zinc-400 uppercase font-bold">C# Web Compiler Workspace</h1>
        </div>
        <button id="runBtn" class="bg-purple-600 hover:bg-purple-500 active:scale-95 text-white text-xs font-mono font-bold uppercase tracking-widest px-6 py-2.5 transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(147,51,234,0.3)] rounded">
            <span>▶</span> RUN CODE
        </button>
    </header>

    <!-- Main Workspace Split-Pane -->
    <main class="flex-1 grid grid-cols-1 md:grid-cols-2 h-[calc(100vh-73px)]">
        
        <!-- Left Window Pane: Code Editor -->
        <div class="flex flex-col border-r border-zinc-800/80">
            <div class="bg-[#111217] px-4 py-2 text-[10px] font-mono tracking-wider text-zinc-500 uppercase border-b border-zinc-800 flex justify-between items-center">
                <span>Program.cs</span>
                <span class="text-purple-400 text-[9px] font-bold">MONACO ENGINE</span>
            </div>
            <!-- Monaco Editor Mount Target -->
            <div id="editorContainer" class="flex-1 w-full bg-[#0D0E12]"></div>
        </div>

        <!-- Right Window Pane: Output Terminal -->
        <div class="flex flex-col bg-black">
            <div class="bg-[#111217] px-4 py-2 text-[10px] font-mono tracking-wider text-zinc-500 uppercase border-b border-zinc-800">
                Execution Console Output
            </div>
            <!-- Dynamic Terminal Stream -->
            <pre id="terminalOutput" class="flex-1 p-6 font-mono text-xs overflow-y-auto text-emerald-400 leading-relaxed whitespace-pre-wrap select-text selection:bg-emerald-900">Console initialized. Write code and press "RUN CODE" to compile...</pre>
        </div>
    </main>

    <!-- Coding Core Implementation Logic -->
    <script>
        let editor;

        // Fetch Monaco Editor core packages via open delivery networks
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            // Default boilerplate template pre-loaded for users
            const boilerplate = `using System;\n\nnamespace BrowserCompiler\n{\n    public class Program\n    {\n        public static void Main(string[] args)\n        {\n            Console.WriteLine("Hello World from the Browser!");\n            \n            int total = 0;\n            for (int i = 1; i <= 10; i++)\n            {\n                total += i;\n            }\n            \n            Console.WriteLine($"Sum of numbers 1 to 10 is: {total}");\n        }\n    }\n}`;

            // Initialize the functional code editor interface
            editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: boilerplate,
                language: 'csharp',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 13,
                fontFamily: 'Consolas, Fira Code, monospace',
                minimap: { enabled: false },
                lineNumbers: 'on',
                padding: { top: 12 }
            });
        });

        // Trigger compilation and listen for events
        document.getElementById('runBtn').addEventListener('click', async () => {
            const outputTerminal = document.getElementById('terminalOutput');
            const runButton = document.getElementById('runBtn');
            
            outputTerminal.innerText = "Connecting to public runtime environment and compiling...";
            outputTerminal.className = "flex-1 p-6 font-mono text-xs overflow-y-auto text-amber-500 leading-relaxed";
            runButton.disabled = true;

            const codePayload = editor.getValue();

            try {
                // Using a reliable public standard code compilation proxy worker
                const response = await fetch('https://api.codex.jaagrav.in', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        language: 'cs', // Map compiler runtime flag to C# (.NET)
                        code: codePayload
                    })
                });

                const data = await response.json();
                
                // Process compilation output stream states
                if (data.output && data.output !== "") {
                    outputTerminal.innerText = data.output;
                    outputTerminal.className = "flex-1 p-6 font-mono text-xs overflow-y-auto text-emerald-400 leading-relaxed";
                } else if (data.error && data.error !== "") {
                    outputTerminal.innerText = `Compilation / Exception Stack Error:\n\n${data.error}`;
                    outputTerminal.className = "flex-1 p-6 font-mono text-xs overflow-y-auto text-red-400 leading-relaxed";
                } else {
                    outputTerminal.innerText = "Code executed successfully but returned an empty output stream.";
                    outputTerminal.className = "flex-1 p-6 font-mono text-xs overflow-y-auto text-zinc-400 italic";
                }
            } catch (err) {
                outputTerminal.innerText = `Network/Proxy Connection Failed.\nDetails: ${err.message}\n\nTip: Ensure you are connected to the internet to query the compilation pipeline proxy.`;
                outputTerminal.className = "flex-1 p-6 font-mono text-xs overflow-y-auto text-red-600 font-bold";
            } finally {
                runButton.disabled = false;
            }
        });
    </script>
</body>
</html>
